<!DOCTYPE html>
<html>

<head>

    <title>Smart Traffic Management System</title>

    <meta http-equiv="refresh" content="1">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(to right,#000000,#1a1a1a);
            color:white;
            text-align:center;
        }

        h1{
            margin-top:30px;
            color:#00ff66;
            font-size:50px;
            text-shadow:0 0 20px #00ff66;
        }

        .dashboard{

            display:flex;
            justify-content:center;
            align-items:center;
            gap:30px;
            margin-top:50px;
            flex-wrap:wrap;
        }

        .card{

            width:250px;
            padding:30px;
            border-radius:20px;
            background:#111;
            box-shadow:0 0 20px rgba(255,255,255,0.2);
            transition:0.3s;
        }

        .card:hover{

            transform:scale(1.05);
            box-shadow:0 0 30px #00ff66;
        }

        .title{

            font-size:25px;
            margin-bottom:20px;
            color:#00ffff;
        }

        .value{

            font-size:40px;
            font-weight:bold;
        }

        .green{
            color:#00ff00;
        }

        .yellow{
            color:yellow;
        }

        .red{
            color:red;
        }

        .footer{

            margin-top:60px;
            color:gray;
            font-size:18px;
        }

    </style>

</head>

<body>

    <h1>SMART TRAFFIC MANAGEMENT SYSTEM</h1>

    <div class="dashboard">

        <!-- Vehicle Count -->
        <div class="card">

            <div class="title">
                Vehicle Count
            </div>

            <div class="value">
                {{ vehicle_count }}
            </div>

        </div>

        <!-- Signal -->
        <div class="card">

            <div class="title">
                Signal Status
            </div>

            <div class="value
                {% if signal == 'GREEN' %}
                    green
                {% elif signal == 'YELLOW' %}
                    yellow
                {% else %}
                    red
                {% endif %}
            ">

                {{ signal }}

            </div>

        </div>

        <!-- Timer -->
        <div class="card">

            <div class="title">
                Green Time
            </div>

            <div class="value">
                {{ green_time }}s
            </div>

        </div>

    </div>

    <div class="footer">

        AI Powered Traffic Monitoring Dashboard 🚦

    </div>

</body>

</html>
